kind = "web"
previewPath = "/"
title = "Order Notification System"
version = "1.0.0"
id = "artifacts/order-notify"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25938

[services.development]
run = "pnpm --filter @workspace/order-notify run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/order-notify", "run", "build" ]
publicDir = "artifacts/order-notify/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25938"
BASE_PATH = "/"
